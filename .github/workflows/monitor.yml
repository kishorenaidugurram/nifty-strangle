name: Monitor & Risk Management

on:
  schedule:
    # Every 15 min during market hours IST (3:45 AM - 10:00 AM UTC)
    # Mon-Fri: 9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC
    - cron: '3,18,33,48 4-9 * * 1-5'   # 4:03-9:48 UTC = 9:33-15:18 IST
    - cron: '0 10 * * 1-5'              # 10:00 UTC = 15:30 IST (market close)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install yfinance pandas numpy requests SmartApi pyotp

      - name: Run monitor
        id: monitor
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python bot.py monitor > monitor_result.json

      - name: ALERT — Stop loss triggered
        if: ${{ fromJSON(steps.monitor.outputs.action) == 'CLOSED' }}
        run: |
          echo "🔴 Stop loss or profit target triggered"
          cat monitor_result.json

      - name: ALERT — Strike breach (violent move)
        if: ${{ fromJSON(steps.monitor.outputs.reason) == 'STRIKE_BREACH_PUT' || fromJSON(steps.monitor.outputs.reason) == 'STRIKE_BREACH_CALL' }}
        run: |
          echo "🚨 VIOLENT MOVE DETECTED — Position closed"
          cat monitor_result.json

      - name: Commit state
        run: |
          git config user.name "Strangle Bot"
          git config user.email "bot@nifty.io"
          git add state.json trade_log.csv monitor_result.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: monitor $(date +'%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} HEAD:main
